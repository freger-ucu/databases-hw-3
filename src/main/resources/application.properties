spring.application.name=parlop
server.error.whitelabel.enabled=true

# Connect to the parlop_db MySQL instance populated by Step 6.
# Override DB_URL / DB_USER / DB_PASSWORD via environment if needed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/parlop_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:secret}

# Do not re-seed the schema or data; Step 6 already populated it.
spring.sql.init.mode=never

logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
